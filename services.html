  <script>
    const T = { fa: { home: "خانه", services: "خدمات", contact: "تماس", faq: "سوالات", news: "اخبار", pageTag: "خدمات تخصصی", pageTitle: "خدمات ما", pageDesc: "راهنمایی کامل در تمام مراحل مهاجرت، از مشاوره تا دریافت ویزا", social: "شبکه‌های اجتماعی", visitBtn: "مشاهده" }, en: { home: "Home", services: "Services", contact: "Contact", faq: "FAQ", news: "News", pageTag: "Specialized Services", pageTitle: "Our Services", pageDesc: "Complete guidance through all stages of immigration, from consultation to visa", social: "Social Networks", visitBtn: "Visit" }, ps: { home: "کور", services: "خدمات", contact: "اړیکه", faq: "پوښتنې", news: "خبرونه", pageTag: "تخصصي خدمات", pageTitle: "زموږ خدمات", pageDesc: "د مهاجرت ټولو مرحلو کې بشپړ لارښود", social: "ټولنیزې شبکې", visitBtn: "وګورئ" } };
    const services = {
      fa: [{ title: "مشاوره رایگان مهاجرت", desc: "ارائه مشاوره ابتدایی و تخصصی به‌صورت رایگان، جهت آشنایی شما با مسیرهای مختلف مهاجرت.", icon: "fas fa-handshake", color: "#b8a0ff", link: "contact/consulting.html" },
      { title: "نشر اخبار مهاجرتی", desc: "پوشش تازه‌ترین اخبار و تحولات مهاجرتی تا شما همیشه از آخرین تغییرات آگاه باشید.", icon: "fas fa-newspaper", color: "#06d6a0", link: "news/day-news/day.html" },
      { title: "ثبت‌نام ویزاهای بشردوستانه", desc: "راهنمایی و همراهی در پروسه ثبت‌نام ویزاهای بشردوستانه با معلومات دقیق.", icon: "fas fa-passport", color: "#ffd166", link: "visa/visa.html" },
      { title: "رهنمودهای مهاجرتی", desc: "رهنمودهای گام به گام از انتخاب مقصد تا آماده‌سازی مدارک.", icon: "fas fa-map-signs", color: "#ff6b6b", link: "guide.html" },
      { title: "سمینارهای تقویتی", desc: "جلسات آموزشی و سمینارهای کاربردی جهت ارتقای دانش شما در زمینه مهاجرت.", icon: "fas fa-chalkboard-teacher", color: "#29b6f6", link: "sem/sem.html" },
      { title: "مشاور هوش مصنوعی", desc: "استفاده از هوش مصنوعی برای پاسخ به سوالات مهاجرتی به صورت فوری.", icon: "fas fa-robot", color: "#e879f9", link: "ai.html" }],
      en: [{ title: "Free Migration Consultation", desc: "Free initial and specialized consultation to help you choose the best immigration path.", icon: "fas fa-handshake", color: "#b8a0ff", link: "contact/consulting.html" },
      { title: "Immigration News", desc: "Latest immigration news so you stay updated with all changes.", icon: "fas fa-newspaper", color: "#06d6a0", link: "news/day-news/day.html" },
      { title: "Humanitarian Visa Registration", desc: "Guidance in humanitarian visa registration with accurate information.", icon: "fas fa-passport", color: "#ffd166", link: "visa/visa.html" },
      { title: "Immigration Guidelines", desc: "Step-by-step guidance from destination selection to document preparation.", icon: "fas fa-map-signs", color: "#ff6b6b", link: "guide.html" },
      { title: "Strengthening Seminars", desc: "Educational sessions to enhance your immigration knowledge.", icon: "fas fa-chalkboard-teacher", color: "#29b6f6", link: "sem/sem.html" },
      { title: "AI Advisor", desc: "Use AI to get instant answers to your immigration questions.", icon: "fas fa-robot", color: "#e879f9", link: "ai.html" }],
      ps: [{ title: "وړیا د مهاجرت مشوره", desc: "د کډوالۍ لپاره وړیا تخصصي مشوره.", icon: "fas fa-handshake", color: "#b8a0ff", link: "contact/consulting.html" },
      { title: "د کډوالۍ خبرونه", desc: "د کډوالۍ وروستي خبرونه.", icon: "fas fa-newspaper", color: "#06d6a0", link: "news/day-news/day.html" },
      { title: "د بشري ویزې ثبتنام", desc: "د بشري ویزې ثبتنام کې لارښوونه.", icon: "fas fa-passport", color: "#ffd166", link: "visa/visa.html" },
      { title: "د کډوالۍ لارښودونه", desc: "د مهاجرت مرحلو ګام پرګام لارښوونه.", icon: "fas fa-map-signs", color: "#ff6b6b", link: "guide.html" },
      { title: "سیمینارونه", desc: "ستاسو د مهاجرت پوهه لوړوي.", icon: "fas fa-chalkboard-teacher", color: "#29b6f6", link: "sem/sem.html" },
      { title: "AI مشاور", desc: "AI سره د مهاجرت پوښتنو ځوابونه.", icon: "fas fa-robot", color: "#e879f9", link: "ai.html" }]
    };
    let lang = 'fa';
    function applyLang(l) {
      lang = l;
      document.querySelectorAll('[data-k]').forEach(el => { const k = el.getAttribute('data-k'); if (T[l][k]) el.innerHTML = T[l][k]; });
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-l') === l));
      renderServices();
    }
    function renderServices() {
      const g = document.getElementById('servicesGrid');
      g.innerHTML = services[lang].map(s => `
    <a href="${s.link}" class="card" style="text-decoration:none;display:block;">
      <div style="padding:2rem;text-align:center;">
        <div style="font-size:2.5rem;color:${s.color};margin-bottom:1rem;transition:transform 0.3s"><i class="${s.icon}"></i></div>
        <div style="font-size:1rem;font-weight:700;color:#fff;margin-bottom:0.7rem">${s.title}</div>
        <div style="font-size:0.85rem;color:var(--text-muted);line-height:1.7">${s.desc}</div>
        <div style="margin-top:1rem;display:inline-block;background:rgba(108,71,255,0.15);border:1px solid rgba(108,71,255,0.3);color:#b8a0ff;padding:6px 18px;border-radius:30px;font-size:0.8rem">${T[lang].visitBtn} →</div>
      </div>
    </a>`).join('');
    }
    // particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 50; i++) { const p = document.createElement('div'); p.className = 'p'; const s = Math.random() * 8 + 3; p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-delay:${Math.random() * 12}s;animation-duration:${12 + Math.random() * 10}s`; pc.appendChild(p); }
    // theme
    const tb = document.getElementById('themeBtn');
    const saved = localStorage.getItem('srs-theme') || 'dark';
    document.body.className = saved + '-mode';
    tb.innerHTML = saved === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    tb.addEventListener('click', () => { const d = document.body.classList.contains('dark-mode'); document.body.className = (d ? 'light' : 'dark') + '-mode'; tb.innerHTML = d ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; localStorage.setItem('srs-theme', d ? 'light' : 'dark'); });
    document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.getAttribute('data-l'))));
    document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('open'));
    applyLang('fa');
  </script>
</body>
