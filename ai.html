<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>سرفراز خموش | Sarfraz AI - دستیار هوشمند پناهندگی</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 30px 20px;
            transition: all 0.3s ease;
        }

        /* انیمیشن پس‌زمینه */
        @keyframes gradientShift {
            0% {
                background-position: 0% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        /* ===== حالت روز (Light Mode) ===== */
        body.light-mode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.light-mode .message.ai-message .bubble {
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
        }

        body.light-mode .input-area {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        body.light-mode .input-area input {
            color: #1e293b;
        }

        body.light-mode .input-area input::placeholder {
            color: rgba(30, 41, 59, 0.6);
        }

        /* ===== حالت شب (Dark Mode) ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }

        body.dark-mode .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body.dark-mode .message.ai-message .bubble {
            background: rgba(30, 41, 59, 0.9);
            color: #e2e8f0;
        }

        body.dark-mode .input-area {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        body.dark-mode .input-area input {
            color: #f1f5f9;
        }

        body.dark-mode .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode .home-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .home-btn:hover {
            background: #f97316;
            color: white;
        }

        /* کانتینر اصلی */
        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        /* دکمه برگشت به خانه با انیمیشن */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .home-btn:hover {
            background: #f97316;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3);
        }

        /* کارت شیشه‌ای */
        .glass-card {
            border-radius: 48px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* هدر */
        .brand-header {
            text-align: center;
            padding: 32px 32px 20px;
        }

        .logo-icon {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            animation: pulse 2s infinite;
            filter: brightness(1) invert(1);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4);
            }

            70% {
                transform: scale(1.02);
                box-shadow: 0 0 0 15px rgba(249, 115, 22, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
            }
        }

        .logo-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-icon img {
            width: 100%;
            height:100%; 
        }

        .logo-icon .default-logo {
            font-size: 44px;
            color: white;
        }

        .brand-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(115deg, #f97316, #ef4444, #fbbf24);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .brand-header p {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 8px;
        }

        /* دکمه‌های زبان و تم - کنار هم */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lang-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: #f97316;
            border-color: #f97316;
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.5);
        }

        .lang-btn:hover {
            transform: translateY(-2px);
            background: rgba(249, 115, 22, 0.8);
        }

        /* دکمه شب/روز */
        .theme-toggle {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .theme-toggle i {
            font-size: 1.2rem;
            color: #ffd966;
            transition: transform 0.3s;
        }

        .theme-toggle:hover {
            background: #f97316;
            transform: rotate(15deg);
        }

        /* بخش چت */
        .chat-container {
            padding: 0 25px 25px;
        }

        .messages {
            height: 430px;
            overflow-y: auto;
            padding: 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* اسکرول بار زیبا */
        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #f97316;
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 20px;
            border-radius: 25px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai-message .bubble {
            border-bottom-left-radius: 5px;
        }

        /* ناحیه ورودی */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 8px;
            border-radius: 60px;
            transition: all 0.3s;
        }

        .input-area input {
            flex: 1;
            padding: 14px 22px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.15);
            transition: all 0.3s;
        }

        .input-area input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
        }

        .input-area button {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-area button i {
            font-size: 1rem;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(249, 115, 22, 0.4);
        }

        .input-area button:active {
            transform: scale(0.98);
        }

        .input-area button:disabled {
            opacity: 0.6;
            transform: none;
        }

        /* تایپینگ انیمیشن */
        .typing {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #f97316;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* فوتر */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer p {
            color: rgba(255, 255, 255, 0.7);
        }

        /* ریسپانسیو */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .brand-header h1 {
                font-size: 1.3rem;
            }

            .lang-btn {
                padding: 5px 14px;
                font-size: 0.75rem;
            }

            .bubble {
                max-width: 90%;
                font-size: 0.85rem;
            }

            .controls-bar {
                flex-direction: column;
                align-items: center;
            }

            .input-area button {
                padding: 0 20px;
            }

            .input-area button span {
                display: none;
            }

            .input-area button i {
                margin: 0;
            }
        }
    </style>
</head>

<body class="light-mode">

    <div class="container">
        <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> برگشت به خانه
        </a>

        <div class="glass-card">
            <div class="brand-header">
                <div class="logo-icon" id="logoIcon">
                    <span class="default-logo">⭐</span>
                </div>
                <h1>سرفراز خموش | Sarfraz Refugee Service</h1>
                <p>دستیار هوشمند | پاسخ به هر سوال در دری، پشتو و انگلیسی</p>
            </div>

            <div class="controls-bar">
                <div class="lang-row">
                    <button class="lang-btn active" data-lang="dari">🇦🇫 دری</button>
                    <button class="lang-btn" data-lang="pashto">🇦🇫 پښتو</button>
                    <button class="lang-btn" data-lang="english">🇬🇧 English</button>
                </div>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </div>
            </div>

            <div class="chat-container">
                <div class="messages" id="messages">
                    <div class="message ai-message">
                        <div class="bubble">
                            🌟 به سرفراز خوش آمدید! سوال خود را بپرسید.<br>
                            ✨ Sarfraz ته ښه راغلاست! خپله پوښتنه وکړئ.<br>
                            Welcome to Sarfraz! Ask your question.
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="question"
                        placeholder="سوال خود را بنویسید... / خپله پوښتنه ولیکئ... / Type your question...">
                    <button id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                        <span>ارسال</span>
                    </button>
                </div>
            </div>

            <div class="footer">
                <p>🔗 قدرت گرفته توسط <strong>Sarfraz Khamoosh</strong> — سریع، دقیق و رایگان</p>
            </div>
        </div>
    </div>

    <script>
        // بارگذاری لوگو
        const logoImages = ['images/bot.png', 'images/ai.png'];
        let logoLoaded = false;
        for (const imgSrc of logoImages) {
            const img = new Image();
            img.onload = function () {
                if (!logoLoaded) {
                    const logoDiv = document.getElementById('logoIcon');
                    logoDiv.innerHTML = `<img src="${imgSrc}" alt="Logo">`;
                    logoLoaded = true;
                }
            };
            img.src = imgSrc;
        }

        // API تنظیمات
        const API_KEY = "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";
        const MODEL = "llama-3.3-70b-versatile";

        let currentLanguage = "dari";
        let isLoading = false;

        const messagesDiv = document.getElementById('messages');
        const questionInput = document.getElementById('question');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai-message';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span> در حال نوشتن...</div>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function cleanAnswer(text, lang) {
            let cleaned = text;
            cleaned = cleaned.replace(/[\u4e00-\u9fff\u3400-\u4dbf\u3000-\u303f]/g, '');
            if (lang === 'dari') {
                const unwanted = ['خوبی جان', 'چنایی', 'صاحب جان', 'جان جان', 'جانم', 'عزیزم', 'قربونت', 'دلبرم', 'فدایت'];
                for (const w of unwanted) cleaned = cleaned.replace(new RegExp(w, 'gi'), '');
            }
            else if (lang === 'pashto') {
                const unwantedPashto = ['ښه یاست', 'څنګه یاست', 'ښه راغلئ', 'جان', 'زما عزیز'];
                for (const w of unwantedPashto) cleaned = cleaned.replace(new RegExp(w, 'gi'), '');
            }
            else if (lang === 'english') {
                cleaned = cleaned.replace(/\b(hey|dude|bro|awesome|no worries|you know|well|so|actually|just)\b/gi, '');
            }
            cleaned = cleaned.replace(/\s+/g, ' ').trim();
            if (cleaned.length === 0) {
                cleaned = lang === 'dari' ? 'پاسخی دریافت نشد. لطفاً دوباره تلاش کنید.' :
                    (lang === 'pashto' ? 'ځواب ترلاسه نه شو. بیا هڅه وکړئ.' : 'No response. Please try again.');
            }
            return cleaned;
        }

        function getSystemPrompt(lang) {
            if (lang === 'dari') {
                return `شما یک دستیار حرفه‌ای به نام "سرفراز خموش" هستید برای "Sarfraz Refugee Service". فقط به زبان دری پاسخ دهید. مستقیم، مفید و کوتاه پاسخ دهید.`;
            }
            else if (lang === 'pashto') {
                return `تاسو د "سرفراز خموش" په نوم مسلکي مرستیال یاست. یوازې په پښتو ژبه ځواب ورکړئ. لنډ او ګټور ځواب ورکړئ.`;
            }
            else {
                return `You are "Sarfraz Khamoosh", a professional AI assistant for "Sarfraz Refugee Service". Respond ONLY in English. Be direct and helpful.`;
            }
        }

        // تغییر زبان
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLanguage = this.getAttribute('data-lang');
                let msg = currentLanguage === 'dari' ? '🔄 به زبان دری تغییر کرد' :
                    (currentLanguage === 'pashto' ? '🔄 پښتو ته بدل شو' : '🔄 Switched to English');
                addMessage(msg, false);
            });
        });

        // دکمه شب/روز
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const themeIcon = themeToggle.querySelector('i');

        function setTheme(theme) {
            if (theme === 'light') {
                body.classList.remove('dark-mode');
                body.classList.add('light-mode');
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                body.classList.add('dark-mode');
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme === 'light' ? 'light' : 'dark');

        themeToggle.addEventListener('click', () => {
            setTheme(body.classList.contains('dark-mode') ? 'light' : 'dark');
        });

        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question || isLoading) return;

            isLoading = true;
            sendBtn.disabled = true;

            addMessage(question, true);
            questionInput.value = '';
            showTyping();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: getSystemPrompt(currentLanguage) },
                            { role: "user", content: question }
                        ],
                        temperature: 0.5,
                        max_tokens: 600
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || `خطا ${response.status}`);

                let rawAnswer = data.choices[0]?.message?.content || "پاسخی دریافت نشد";
                let finalAnswer = cleanAnswer(rawAnswer, currentLanguage);

                hideTyping();
                addMessage(finalAnswer, false);
            } catch (error) {
                hideTyping();
                let errorMsg = currentLanguage === 'dari' ? '❌ خطا: ' :
                    (currentLanguage === 'pashto' ? '❌ تېروتنه: ' : '❌ Error: ');
                addMessage(errorMsg + error.message, false);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
